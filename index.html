<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/placeholder.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="lomadee" content="2324685" />
    <title>Cuponito - Cupons de Desconto Verificados</title>
    <meta
      name="description"
      content="Encontre cupons de desconto atualizados diariamente para Amazon, Shopee, Mercado Livre e centenas de outras lojas. Economia real e verificada."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://jyvmrkykukialdbcebei.supabase.co" />
    <link rel="dns-prefetch" href="https://jyvmrkykukialdbcebei.supabase.co" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Lexend:wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      body { margin: 0; background-color: #F5F3EF; }
      .initial-loader {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100%;
      }
      .spinner {
        width: 42px;
        height: 42px;
        border: 4px solid rgba(255, 77, 0, 0.1);
        border-left-color: #FF4D00;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-loader">
        <div class="spinner"></div>
      </div>
    </div>
    <noscript>
      <div style="padding: 20px; text-align: center; background: #FFF0EB; color: #FF4D00; font-family: sans-serif;">
        <strong>Atenção:</strong> Você precisa habilitar o JavaScript para usar o Cuponito e visualizar os cupons.
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
