name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-supabase-functions.yml'
  workflow_dispatch:
    inputs:
      function_name:
        description: 'Nome de uma função específica (ou deixe vazio para deployar todas)'
        required: false
        type: string

concurrency:
  group: deploy-supabase-functions
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: jyvmrkykukialdbcebei
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Determina funções a deployar
        id: fns
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ github.event.inputs.function_name }}" ]; then
              echo "fns=${{ github.event.inputs.function_name }}" >> "$GITHUB_OUTPUT"
              echo "Selecionada manualmente: ${{ github.event.inputs.function_name }}"
            else
              all=$(ls supabase/functions/ | tr '\n' ' ')
              echo "Dispatch sem função específica — deployando todas: $all"
              echo "fns=$all" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi
          # Push: deploya apenas funções tocadas no commit
          changed=$(git diff --name-only HEAD^ HEAD -- 'supabase/functions/' | awk -F/ '{print $3}' | sort -u | tr '\n' ' ')
          if [ -z "$changed" ]; then
            echo "Nenhuma função alterada neste push."
            echo "fns=" >> "$GITHUB_OUTPUT"
          else
            echo "Funções alteradas: $changed"
            echo "fns=$changed" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy
        if: steps.fns.outputs.fns != ''
        run: |
          set -euo pipefail
          for fn in ${{ steps.fns.outputs.fns }}; do
            echo "::group::Deploy $fn"
            supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF"
            echo "::endgroup::"
          done
