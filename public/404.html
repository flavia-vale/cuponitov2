<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecionando...</title>
    <script type="text/javascript">
      // Captura o caminho e a query string originais
      var path = window.location.pathname;
      var search = window.location.search;
      
      // Redireciona para a raiz passando a rota original no parâmetro 'path'
      // Isso evita que o servidor (ou Cloudflare) mostre uma página de erro
      window.location.replace('/?path=' + encodeURIComponent(path + search));
    </script>
  </head>
  <body>
  </body>
</html>
